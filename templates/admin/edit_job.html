{% extends 'base.html' %}
{% block title %}Edit Job{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">Edit Job</h4>
    <a href="{{ url_for('admin_jobs') }}" class="btn btn-outline-secondary btn-sm">
        <i class="fa-solid fa-arrow-left me-1"></i> Back
    </a>
</div>

<!-- Form to update an existing job's details -->
<div class="card p-4" style="max-width: 700px;">
    <form action="{{ url_for('edit_job', job_id=job.id) }}" method="POST">
        <div class="row g-3">

            <div class="col-12">
                <label class="form-label fw-semibold">Job Title <span class="text-danger">*</span></label>
                <input type="text" name="title" class="form-control" value="{{ job.title }}" required>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold">Category</label>
                <select name="category_id" class="form-select">
                    <option value="">-- Select Category --</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}" {% if job.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold">Age Limit</label>
                <input type="text" name="age_limit" class="form-control" value="{{ job.age_limit or '' }}">
            </div>

            <div class="col-12">
                <label class="form-label fw-semibold">Qualification</label>
                <input type="text" name="qualification" class="form-control" value="{{ job.qualification or '' }}">
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold">Salary</label>
                <input type="text" name="salary" class="form-control" value="{{ job.salary or '' }}">
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold">Last Date</label>
                <input type="date" name="last_date" class="form-control"
                       value="{{ job.last_date.strftime('%Y-%m-%d') if job.last_date else '' }}">
            </div>

            <div class="col-12">
                <label class="form-label fw-semibold">Apply Link</label>
                <input type="url" name="apply_link" class="form-control" value="{{ job.apply_link or '' }}">
            </div>

        </div>

        <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">
                <i class="fa-solid fa-save me-2"></i>Update Job
            </button>
            <a href="{{ url_for('admin_jobs') }}" class="btn btn-outline-secondary px-4">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
