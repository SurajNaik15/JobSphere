{% extends 'base.html' %}
{% block title %}Admin Login{% endblock %}

{# No sidebar on admin login page #}
{% block sidebar %}{% endblock %}

{% block content %}

<!-- Centered admin login box -->
<div class="container" style="max-width: 400px; margin-top: 3rem;">
    <div class="auth-card">

        <div class="text-center mb-4">
            <i class="fa-solid fa-shield-halved fa-2x text-danger mb-2"></i>
            <h4 class="fw-bold">Admin Panel</h4>
            <p class="text-muted small">Restricted access - authorized personnel only</p>
        </div>

        <form action="{{ url_for('admin_login') }}" method="POST">

            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Admin username" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Admin password" required>
            </div>

            <button type="submit" class="btn btn-danger w-100 fw-semibold py-2">
                <i class="fa-solid fa-lock-open me-2"></i>Login as Admin
            </button>
        </form>

        <p class="text-center mt-3 text-muted small">
            <a href="{{ url_for('login') }}" class="text-secondary">&larr; Back to user login</a>
        </p>

    </div>
</div>

{% endblock %}
